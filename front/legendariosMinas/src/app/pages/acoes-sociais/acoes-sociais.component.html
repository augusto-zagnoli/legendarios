<div class="container" style="margin-top: 80px; margin-bottom: 40px;">

  <div class="text-center mb-5">
    <h2 class="fw-bold" style="color: chocolate;">Ações Sociais</h2>
    <p class="text-muted lead">Conheça as ações e iniciativas dos Legendários - MG</p>
    <hr>
  </div>

  <!-- Carregando -->
  <div *ngIf="carregando" class="text-center py-5">
    <div class="spinner-border text-warning" role="status"></div>
    <p class="mt-2 text-muted">Carregando...</p>
  </div>

  <!-- Erro -->
  <div *ngIf="erro && !carregando" class="alert alert-danger text-center">{{ erro }}</div>

  <!-- Sem anúncios -->
  <div *ngIf="!carregando && !erro && anuncios.length === 0" class="text-center py-5 text-muted">
    <p>Nenhuma ação social cadastrada no momento. Volte em breve!</p>
  </div>

  <!-- Cards de anúncios -->
  <div class="row g-4" *ngIf="!carregando && anuncios.length > 0">
    <div class="col-12 col-md-6 col-lg-4" *ngFor="let a of anuncios">
      <div class="card h-100 shadow-sm border-0">
        <img [src]="a.imagem_url" class="card-img-top" alt="{{ a.titulo }}"
          style="height: 220px; object-fit: cover;"
          onerror="this.src='assets/imgTop/logoTop.png'">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title fw-bold" style="color: chocolate;">{{ a.titulo }}</h5>
          <p class="card-text text-muted flex-grow-1">{{ a.texto }}</p>
          <a *ngIf="a.link" [href]="a.link" target="_blank" rel="noopener noreferrer"
            class="btn btn-warning mt-3 w-100 fw-bold">
            Saiba mais
          </a>
        </div>
      </div>
    </div>
  </div>

</div>
