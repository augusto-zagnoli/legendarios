<header>
  <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
    <div class="container-fluid">
      <img src="../../assets/imgTop/logoTop.png" class="bi me-4" style="margin: 0%;" width="100" height="60">
      <a class="navbar-brand" style="color: coral" href="#">Legendarios - MG </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"
        aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMain">

        <ul class="navbar-nav me-auto mb-2 mb-md-0">
          <li class="nav-item">
            <a class="nav-link active" style="color: coral" aria-current="page" routerLink="/home" (click)="homeclick()">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/acoes-sociais">Ações Sociais</a>
          </li>
        </ul>

        <button class="btn btn-warning"
        style="margin-left: 1em ;"
        routerLink="/home-adm"
        >ADM</button>

        <button class="btn btn-warning"
        style="margin-left: 1em ;"
        routerLink="/descricao-evento-senderista"
        >Cadastrar</button>

        <ng-container *ngIf="estaLogado">
          <span class="navbar-text ms-3" style="color: #adb5bd; font-size: 0.9em;">
            <i>{{ usuarioLogado }}</i>
          </span>
          <button class="btn btn-outline-danger btn-sm ms-2" (click)="logout()">Sair</button>
        </ng-container>
      </div>
    </div>
  </nav>
</header>
