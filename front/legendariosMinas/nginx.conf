server {
  listen 80;
  server_name legendarios.cloud;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name legendarios.cloud;
  ssl_certificate /etc/letsencrypt/live/legendarios.cloud/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/legendarios.cloud/privkey.pem;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html =404;
  }
}